server {
    listen 8080;
    server_name clawsum.com www.clawsum.com;
    root /usr/share/nginx/html;
    index index.html;

    # Security / SEO helpers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /robots.txt { }
    location = /sitemap.xml { }
    location = /site.webmanifest {
        default_type application/manifest+json;
    }

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    location ~* \.(css|svg|png|jpe?g|js|ico|woff2|webmanifest)$ {
        expires 14d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

server {
    listen 8080;
    server_name login.clawsum.com;
    root /usr/share/nginx/html/login;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 14d;
    }
}

server {
    listen 8080;
    server_name connect.clawsum.com;
    root /usr/share/nginx/html/connect;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 14d;
    }
}
