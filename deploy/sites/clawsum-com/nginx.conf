server {
    listen 8080;
    server_name clawsum.com www.clawsum.com;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(css|svg|png|jpg|js|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

server {
    listen 8080;
    server_name login.clawsum.com;
    root /usr/share/nginx/html/login;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8080;
    server_name connect.clawsum.com;
    root /usr/share/nginx/html/connect;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
